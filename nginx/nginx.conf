# ============================================================
# Nginx Configuration for Money Manager
# ============================================================
# - Reverse proxy for Django API (/api/, /admin/)
# - Static file serving for frontend (/)
# - Gzip compression for performance
# ============================================================

upstream django {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Proxy API and Admin to Django ───────────────────────
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        
        # ── Cookie Handling ────────────────────────────────
        # Pass cookies as-is from backend (no modification needed)
        # Cookies from backend already have correct Path and HttpOnly flags
    }

    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django Static Files (admin CSS/JS) ──────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend Static Files ───────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
