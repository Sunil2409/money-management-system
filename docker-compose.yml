# ============================================================
# Docker Compose — Money Manager Full Stack
# ============================================================
# Services:
#   db       — PostgreSQL 16 (persistent data)
#   redis    — Redis 7 (caching layer)
#   backend  — Django + Gunicorn (API server)
#   nginx    — Reverse proxy + frontend static files
# ============================================================
# Usage:
#   docker compose up -d --build    # Start all services
#   docker compose down             # Stop all services
#   docker compose logs -f backend  # Tail backend logs
# ============================================================

services:
  # ── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: money_manager
      POSTGRES_USER: mm_user
      POSTGRES_PASSWORD: mm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm_user -d money_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Django core settings
      - DEBUG=False
      - SECRET_KEY=change-me-in-production-use-a-real-secret-key
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,127.0.0.1:80,localhost:80
      
      # CORS settings (for frontend origin)
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1,http://localhost:80,http://backend:80
      - CORS_ALLOW_ALL_ORIGINS=False
      
      # Database
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=money_manager
      - DB_USER=mm_user
      - DB_PASSWORD=mm_password
      - DB_HOST=db
      - DB_PORT=5432
      
      # Redis cache
      - REDIS_URL=redis://redis:6379/0
      
      # httpOnly Cookie security (production only)
      - SECURE_COOKIE_ENABLED=False
      - SECURE_SSL_REDIRECT=False
      - SESSION_COOKIE_SECURE=False
      - CSRF_COOKIE_SECURE=False
      
      # Logging
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  static_files:
