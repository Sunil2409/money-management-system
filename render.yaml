# ============================================================
# Render Blueprint — Infrastructure as Code
# ============================================================
# Push this file to GitHub, then on Render:
#   Dashboard → New → Blueprint → Select repo
# Render will automatically provision all services below.
# ============================================================

services:
  # ── Backend: Django REST API (Docker) ───────────────────────
  - type: web
    name: money-manager-backend
    env: docker
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    healthCheckPath: /api/health/
    envVars:
      # ── Django Core ──────────────────────────────────────────
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: money-manager-backend.onrender.com
      - key: DJANGO_ALLOWED_HOSTS
        value: money-manager-backend.onrender.com

      # ── Database ─────────────────────────────────────────────
      # Render auto-sets DATABASE_URL to internal PostgreSQL URL
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: money-manager-db
          property: connectionString

      # ── Redis (optional, for caching) ────────────────────────
      - key: REDIS_URL
        fromService:
          name: money-manager-redis
          type: redis
          property: connectionString

      # ── Security ─────────────────────────────────────────────
      - key: SECURE_COOKIE_ENABLED
        value: "True"
      - key: HTTPONLY_COOKIES_ENABLED
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"

      # ── CORS ─────────────────────────────────────────────────
      # Auto-resolves to the frontend static site URL
      - key: CORS_ALLOWED_ORIGINS
        value: https://money-manager-frontend.onrender.com

  # ── Redis (Cache) ───────────────────────────────────────────
  - type: redis
    name: money-manager-redis
    plan: free
    ipAllowList: []

  # ── Frontend: Static Site ──────────────────────────────────────
  - type: web
    name: money-manager-frontend
    env: static
    branch: main
    rootDir: frontend
    buildCommand: echo "No build needed — static HTML/CSS/JS"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        value: https://money-manager-backend.onrender.com/api

# ── Database ──────────────────────────────────────────────────
databases:
  - name: money-manager-db
    plan: free
